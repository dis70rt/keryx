  #     - ./data:/app/data
  #   restart: on-failure
  #   depends_on:
  #     - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Start ollama, wait 5 seconds, pull gemma, then keep container running
    entrypoint: >
      sh -c "ollama serve & sleep 5 && ollama pull gemma4:e2b && wait"

volumes:
  ollama_data:
